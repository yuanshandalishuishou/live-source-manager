Testing:
  ad_keywords: no_signal,/ad/,advertisement,测试卡,无信号,test_pattern,colorbar,broadcast_test,signal_lost
  ad_max_duration: '90'
  auto_scan_daily_time: 03:00
  auto_scan_enabled: 'False'
  auto_scan_interval_hours: '24'
  auto_scan_mode: interval
  cache_ttl: '120'
  concurrent_threads: '40'
  enable_ad_detect: 'True'
  enable_host_speed_share: 'True'
  enable_source_freeze: 'True'
  enable_speed_test: 'True'
  freeze_base_seconds: '60'
  freeze_fail_threshold: '3'
  freeze_max_hours: '24'
  global_blacklist: ''
  global_whitelist: ''
  max_concurrent_ffprobe: '16'
  max_test_attempts: '1'
  output_sort_by: speed
  speed_test_duration: '6'
  timeout: '10'
UserAgents:
  ua_enabled: 'False'
  ua_position: extinf
