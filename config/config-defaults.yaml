# config-defaults.yaml — 配置默认值与源URL定义
# 本文件由 app.config.Config._DEFAULT_VALUES 自动同步生成，作为 SECTION_SCHEMA 默认值的覆盖源。
# 单一事实来源是 app/config.py 的 _DEFAULT_VALUES；修改默认值请改那里，本文件保持一致。

Filter:
  max_latency: '4000'
  max_resolution: 4k
  min_bitrate: '80'
  min_resolution: 360p
  min_speed: '50'
  must_4k: 'False'
  must_hd: 'False'
  resolution_filter_mode: range
GitHub:
  api_token: ''
  api_url: https://api.github.com
  rate_limit: '5000'
HTTPServer:
  document_root: ./www/output
  enabled: 'True'
  fileshare_port: '12345'
  host: 0.0.0.0
  manager_port: '23456'
Logging:
  backup_count: '5'
  file: ./log/app.log
  level: INFO
  max_size: '10'
Network:
  github_mirror: https://ghproxy.com/
  ipv6_enabled: 'True'
  proxy_enabled: 'False'
  proxy_host: 192.168.1.46
  proxy_password: ''
  proxy_port: '1800'
  proxy_type: socks5
  proxy_username: ''
Output:
  enable_filter: 'False'
  filename: live.m3u
  group_by: category
  include_failed: 'False'
  max_sources_per_channel: '8'
  whitelist_force_keep: 'False'
Sources:
  channel_ua_overrides: '{}'
  github_source_settings: '{}'
  github_sources: 'wcb1969/iptv/main

    joevess/IPTV/main

    suxuang/myIPTV/main

    YueChan/Live

    YanG-1989/m3u

    qwerttvv/Beijing-IPTV

    joevess/IPTV

    cymz6/AutoIPTV-Hotel

    Rivens7/Livelist'
  local_dirs: ./config/sources
  online_urls: 'https://live.zbds.org/tv/iptv4.m3u

    https://myernestlu.github.io/zby.txt

    https://raw.githubusercontent.com/Rivens7/Livelist/main/CCTV.m3u

    https://raw.githubusercontent.com/Rivens7/Livelist/main/CNTV.m3u

    https://raw.githubusercontent.com/Rivens7/Livelist/main/IPTV.m3u

    https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/ipv4/result.m3u

    https://raw.githubusercontent.com/suxuang/myIPTV/refs/heads/main/ipv4.m3u

    https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/cnTV_AutoUpdate.m3u8

    https://raw.githubusercontent.com/zwc456baby/iptv_alive/refs/heads/master/live.m3u

