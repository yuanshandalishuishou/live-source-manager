[Sources]
local_dirs = /config/sources
online_urls = http://test.m3u
github_sources = 
	wcb1969/iptv/main
	joevess/IPTV/main
	suxuang/myIPTV/blob/main
	YueChan/Live
	YanG-1989/m3u
	qwerttvv/Beijing-IPTV
	joevess/IPTV
	cymz6/AutoIPTV-Hotel
	Rivens7/Livelist

[Network]
proxy_enabled = False
proxy_type = socks5
proxy_host = 192.168.1.46
proxy_port = 1800
proxy_username = 
proxy_password = 
ipv6_enabled = True

[HTTPServer]
enabled = True
host = 0.0.0.0
port = 12345
document_root = /www/output

[GitHub]
api_url = https://api.github.com
api_token = 
rate_limit = 5000

[Testing]
timeout = 10
concurrent_threads = 40
cache_ttl = 120
enable_speed_test = True
speed_test_duration = 6

[Output]
filename = live.m3u
group_by = category
include_failed = False
max_sources_per_channel = 8
enable_filter = False

[Logging]
level = INFO
file = /log/app.log
max_size = 10
backup_count = 5

[Filter]
max_latency = 4000
min_bitrate = 80
must_hd = False
must_4k = False
min_speed = 50
min_resolution = 360p
max_resolution = 4k
resolution_filter_mode = range

[UserAgents]
ua_position = extinf
ua_enabled = False

