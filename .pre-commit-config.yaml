# pre-commit 配置 — 使用本地安装的工具（避免网络依赖）
# tools invoked via managed venv python absolute path (no project .venv / PATH dependency)

repos:
  # 基础钩子（本地 Python 实现）
  - repo: local
    hooks:
      - id: check-yaml
        name: check-yaml
        entry: C:/Users/Administrator/.workbuddy/binaries/python/envs/default/Scripts/python.exe -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))"
        language: system
        files: \.(yaml|yml)$
        pass_filenames: true

      - id: check-large-files
        name: check-large-files
        entry: C:/Users/Administrator/.workbuddy/binaries/python/envs/default/Scripts/python.exe -c "import os,sys; f=sys.argv[1]; exit(0 if os.path.getsize(f)<500000 else 1)"
        language: system
        pass_filenames: true

      # Ruff — lint + autofix
      - id: ruff
        name: ruff check
        entry: C:/Users/Administrator/.workbuddy/binaries/python/envs/default/Scripts/python.exe -m ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        files: ^(app|web|tests)/

      # Ruff — format
      - id: ruff-format
        name: ruff format
        entry: C:/Users/Administrator/.workbuddy/binaries/python/envs/default/Scripts/python.exe -m ruff format
        language: system
        types: [python]
        files: ^(app|web|tests)/

      # mypy — 类型检查（仅核心模块）
      - id: mypy
        name: mypy
        entry: C:/Users/Administrator/.workbuddy/binaries/python/envs/default/Scripts/python.exe -m mypy --config-file=pyproject.toml --no-incremental
        language: system
        types: [python]
        files: ^app/(exceptions|utils|logger)\.py$
