{% extends "base.html" %}
{% block title %}{% if source %}编辑源{% else %}添加源{% endif %} - 直播源管理器{% endblock %}
{% block page_title %}{% if source %}编辑源{% else %}添加源{% endif %}{% endblock %}

{% block content %}
<div class="source-form-page">
    <div class="card" style="max-width: 640px;">
        <div class="card-header">
            <h3>{% if source %}编辑源信息{% else %}添加新的直播源{% endif %}</h3>
        </div>
        <div class="card-body">
            <form hx-{% if source %}put="/api/sources/{{ source_id }}"{% else %}post="/api/sources"{% endif %}
                  hx-target="#form-result"
                  hx-swap="innerHTML"
                  class="form">
                <div class="form-group">
                    <label for="name">源名称</label>
                    <input type="text" id="name" name="name" class="form-input"
                           value="{{ (source.get('name', '') | e) if source else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="url">源 URL</label>
                    <input type="url" id="url" name="url" class="form-input"
                           value="{{ (source.get('url', '') | e) if source else '' }}" required
                           placeholder="https://example.com/stream.m3u8">
                </div>
                <div class="form-group">
                    <label for="source_type">源类型</label>
                    <select id="source_type" name="source_type" class="form-select">
                        <option value="online" {% if source and source.get('source_type') == 'online' %}selected{% endif %}>在线源</option>
                        <option value="local" {% if source and source.get('source_type') == 'local' %}selected{% endif %}>本地源</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="group">分组</label>
                    <input type="text" id="group" name="group" class="form-input"
                           value="{{ (source.get('group', '') | e) if source else '' }}"
                           placeholder="如: 央视, 卫视, 地方台">
                </div>
                <div class="form-group">
                    <label for="logo">图标 URL</label>
                    <input type="url" id="logo" name="logo" class="form-input"
                           value="{{ (source.get('logo', '') | e) if source else '' }}"
                           placeholder="https://example.com/logo.png">
                </div>
                <div id="form-result"></div>
                <div class="form-actions">
                    <a href="/sources" class="btn btn-outline">取消</a>
                    <button type="submit" class="btn btn-primary">
                        {% if source %}保存修改{% else %}添加源{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.querySelector('.form form')?.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.successful) {
        setTimeout(function() { window.location.href = '/sources'; }, 1000);
    }
});
document.querySelector('.form form')?.addEventListener('htmx:responseError', function(evt) {
    const result = document.getElementById('form-result');
    try {
        const data = JSON.parse(evt.detail.xhr.responseText);
        result.innerHTML = '<div class="alert alert-error">' + (data.detail || '操作失败') + '</div>';
    } catch {
        result.innerHTML = '<div class="alert alert-error">操作失败</div>';
    }
});
</script>
{% endblock %}
