{% extends "base.html" %}
{% block title %}审计日志 - 直播源管理器{% endblock %}
{% block page_title %}📝 审计日志{% endblock %}

{% block content %}
<div class="audit-page">
    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="toolbar-left">
            <label style="font-size:14px;display:flex;align-items:center;gap:6px">
                操作类型:
                <select id="audit-action-filter" class="form-select form-select-sm" onchange="loadAuditLogs(1)">
                    <option value="">全部</option>
                </select>
            </label>
            <span style="font-size:13px;color:var(--text-light)" id="audit-total"></span>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-outline btn-sm" onclick="loadAuditLogs(currentPage)">🔄 刷新</button>
        </div>
    </div>

    <!-- 审计日志列表 -->
    <div class="card">
        <div class="card-header"><h3>审计日志</h3></div>
        <div class="card-body" id="audit-list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="audit-pagination"></div>
</div>
{% endblock %}

{% block head %}
<script src="/static/js/audit-components.js"></script>
<script>
var currentPage = 1;
var pageSize = 50;

// ── 页面初始化 ──────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    loadActionTypes();
    loadAuditLogs(1);
});

// ── 加载操作类型列表 ────────────────────────────
function loadActionTypes() {
    fetch('/api/audit/actions')
        .then(function(r) { return r.json(); })
        .then(function(actions) {
            var sel = document.getElementById('audit-action-filter');
            if (!sel) return;
            while (sel.options.length > 1) sel.remove(1);
            (actions || []).forEach(function(a) {
                var opt = document.createElement('option');
                opt.value = a;
                opt.textContent = actionLabels[a] || a;
                sel.appendChild(opt);
            });
        })
        .catch(function() {});
}

// ── 加载审计日志 ────────────────────────────────
function loadAuditLogs(page) {
    page = page || 1;
    currentPage = page;
    var action = document.getElementById('audit-action-filter').value;
    var url = '/api/audit?page=' + page + '&size=' + pageSize;
    if (action) url += '&action=' + encodeURIComponent(action);

    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) { renderAuditLogs(data); })
        .catch(function(e) {
            document.getElementById('audit-list').innerHTML =
                '<div class="alert alert-error">加载失败: ' + e + '</div>';
        });
}
</script>
{% endblock %}
